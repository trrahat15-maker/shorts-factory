name: Daily Upload

on:
  schedule:
    # 3:00 PM Saudi (UTC+3) = 12:00 UTC
    - cron: "0 12 * * *"
    # 4:00 AM Saudi (UTC+3) = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto = generate new video, backup = upload from backup list"
        required: true
        default: "backup"
      backup_count:
        description: "How many backup videos to upload (backup mode only)"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Secret scan
        run: node scripts/secretScan.js

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak

      - name: Install dependencies
        run: npm install

      - name: Run automation
        run: node scripts/autoUpload.js
        env:
          COMMAND: UPLOAD_NOW
          UPLOAD_CHANCE: "1"
          FORCE_UPLOAD: "true"
          BACKUP_ONLY: "true"
          BACKUP_UPLOAD_COUNT: ${{ github.event.inputs.backup_count || '1' }}
          DROPBOX_ONLY: "true"
          MANUAL_TITLE_FROM_FILENAME: "true"
          MANUAL_DESCRIPTION_FROM_FILENAME: "true"
          AUTO_HASHTAGS_FROM_TITLE: "true"
          DROPBOX_DELETE_AFTER_UPLOAD: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS || 'public' }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL_LIST: ${{ secrets.OPENAI_MODEL_LIST }}
          OPENAI_MODEL_ATTEMPTS: ${{ secrets.OPENAI_MODEL_ATTEMPTS }}
          OPENAI_RETRY_DELAYS: ${{ secrets.OPENAI_RETRY_DELAYS }}
          ENABLE_TRENDS: ${{ secrets.ENABLE_TRENDS }}
          TRENDS_REGION: ${{ secrets.TRENDS_REGION }}
          TRENDS_LANGUAGE: ${{ secrets.TRENDS_LANGUAGE }}
          TREND_MAX_TOPICS: ${{ secrets.TREND_MAX_TOPICS }}
          HOOK_VARIANTS: ${{ secrets.HOOK_VARIANTS }}
          AB_TEST: ${{ secrets.AB_TEST }}
          POST_COMMENT: ${{ secrets.POST_COMMENT }}
          PINNED_COMMENT: ${{ secrets.PINNED_COMMENT }}
          SAVE_ARTIFACTS: ${{ secrets.SAVE_ARTIFACTS }}
          ENABLE_THUMBNAIL: ${{ secrets.ENABLE_THUMBNAIL }}
          AUTO_REPLY_COMMENTS: ${{ secrets.AUTO_REPLY_COMMENTS }}
          REPLY_COMMENT_TEXT: ${{ secrets.REPLY_COMMENT_TEXT }}
          SCHEDULE_TZ: ${{ secrets.SCHEDULE_TZ }}
          SCHEDULE_LEAD_MINUTES: ${{ secrets.SCHEDULE_LEAD_MINUTES }}
          SCHEDULE_WINDOW_MINUTES: ${{ secrets.SCHEDULE_WINDOW_MINUTES }}
          SCHEDULE_MIN_AGE_HOURS: ${{ secrets.SCHEDULE_MIN_AGE_HOURS }}
          SCHEDULE_LOOKBACK_VIDEOS: ${{ secrets.SCHEDULE_LOOKBACK_VIDEOS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ENABLE_STOCK_VIDEO: ${{ secrets.ENABLE_STOCK_VIDEO }}
          ENABLE_IMAGE_MODE: ${{ secrets.ENABLE_IMAGE_MODE }}
          MIX_USER_MEDIA: ${{ secrets.MIX_USER_MEDIA }}
          SUBTITLE_MODE: ${{ secrets.SUBTITLE_MODE }}
          SUBTITLE_HIGHLIGHT: ${{ secrets.SUBTITLE_HIGHLIGHT }}
          ELEVENLABS_VOICE: ${{ secrets.ELEVENLABS_VOICE }}
          VIDEO_TITLE: ${{ secrets.VIDEO_TITLE }}
          VIDEO_DESCRIPTION: ${{ secrets.VIDEO_DESCRIPTION }}
          VIDEO_TAGS: ${{ secrets.VIDEO_TAGS }}
          MAX_DURATION: ${{ secrets.MAX_DURATION }}
          MIN_DURATION: ${{ secrets.MIN_DURATION }}
          SCRIPT_DURATION_SECONDS: ${{ secrets.SCRIPT_DURATION_SECONDS }}
          BASE_VIDEO_URLS: ${{ secrets.BASE_VIDEO_URLS }}
          MUSIC_URLS: ${{ secrets.MUSIC_URLS }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_FOLDER_PATH: ${{ secrets.DROPBOX_FOLDER_PATH }}
          DROPBOX_SYSTEM_ROOT: ${{ secrets.DROPBOX_SYSTEM_ROOT }}
          DROPBOX_USE_SYSTEM_FOLDERS: ${{ secrets.DROPBOX_USE_SYSTEM_FOLDERS }}
          DROPBOX_UPLOAD_BACKUPS: ${{ secrets.DROPBOX_UPLOAD_BACKUPS }}
          DROPBOX_SAVE_GENERATED: ${{ secrets.DROPBOX_SAVE_GENERATED }}
          HASHTAGS: ${{ secrets.HASHTAGS }}
          ENABLE_COMPETITOR_ANALYSIS: ${{ secrets.ENABLE_COMPETITOR_ANALYSIS }}
          COMPETITOR_QUERY: ${{ secrets.COMPETITOR_QUERY }}
          COMPETITOR_CHANNELS: ${{ secrets.COMPETITOR_CHANNELS }}
          COMPETITOR_VIDEOS_PER_CHANNEL: ${{ secrets.COMPETITOR_VIDEOS_PER_CHANNEL }}
          ENABLE_TREND_SHORTS: ${{ secrets.ENABLE_TREND_SHORTS }}
          TREND_SHORTS_QUERY: ${{ secrets.TREND_SHORTS_QUERY }}
          TREND_SHORTS_DAYS: ${{ secrets.TREND_SHORTS_DAYS }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-artifacts
          if-no-files-found: warn
          path: |
            artifacts/*.mp4
            data/learning.json

  analyze:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run channel analysis
        run: node scripts/analyzeChannel.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_CONTEXT: ${{ secrets.CHANNEL_CONTEXT }}
          ANALYSIS_VIDEO_COUNT: ${{ secrets.ANALYSIS_VIDEO_COUNT }}
          ANALYSIS_OUTPUT: analysis.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: channel-analysis
          path: analysis.md
