name: Daily Upload

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Secret scan
        run: node scripts/secretScan.js

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Run automation
        run: node scripts/autoUpload.js
        env:
          UPLOAD_CHANCE: ${{ github.event.schedule == '0 21 * * *' && '0.6' || '1' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL_LIST: ${{ secrets.OPENAI_MODEL_LIST }}
          OPENAI_MODEL_ATTEMPTS: ${{ secrets.OPENAI_MODEL_ATTEMPTS }}
          OPENAI_RETRY_DELAYS: ${{ secrets.OPENAI_RETRY_DELAYS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ENABLE_STOCK_VIDEO: ${{ secrets.ENABLE_STOCK_VIDEO }}
          ENABLE_IMAGE_MODE: ${{ secrets.ENABLE_IMAGE_MODE }}
          MIX_USER_MEDIA: ${{ secrets.MIX_USER_MEDIA }}
          SUBTITLE_MODE: ${{ secrets.SUBTITLE_MODE }}
          SUBTITLE_HIGHLIGHT: ${{ secrets.SUBTITLE_HIGHLIGHT }}
          ELEVENLABS_VOICE: ${{ secrets.ELEVENLABS_VOICE }}
          VIDEO_TITLE: ${{ secrets.VIDEO_TITLE }}
          VIDEO_DESCRIPTION: ${{ secrets.VIDEO_DESCRIPTION }}
          VIDEO_TAGS: ${{ secrets.VIDEO_TAGS }}
          MAX_DURATION: ${{ secrets.MAX_DURATION }}
          MIN_DURATION: ${{ secrets.MIN_DURATION }}
          SCRIPT_DURATION_SECONDS: ${{ secrets.SCRIPT_DURATION_SECONDS }}
          BASE_VIDEO_URLS: ${{ secrets.BASE_VIDEO_URLS }}
          MUSIC_URLS: ${{ secrets.MUSIC_URLS }}

  analyze:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run channel analysis
        run: node scripts/analyzeChannel.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_CONTEXT: ${{ secrets.CHANNEL_CONTEXT }}
          ANALYSIS_VIDEO_COUNT: ${{ secrets.ANALYSIS_VIDEO_COUNT }}
          ANALYSIS_OUTPUT: analysis.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: channel-analysis
          path: analysis.md
