name: Daily Shorts Factory - Auto Upload

on:
  schedule:
    # Run every 2 hours during peak times (8 AM - 10 PM UTC)
    # Adjust based on your target audience's timezone
    - cron: '15 6,8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Force upload (bypass smart schedule)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      command:
        description: 'Command to run'
        required: false
        default: 'UPLOAD_NOW'
        type: choice
        options:
          - 'UPLOAD_NOW'
          - 'GENERATE_BACKUP'
          - 'BACKUP_ONLY'
          - 'CHECK_LOGS'

env:
  # === REQUIRED: YouTube API ===
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  
  # === REQUIRED: AI Services ===
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  
  # === OPTIONAL but recommended: Better voice quality ===
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  
  # === OPTIONAL: Stock Media (for auto-generating visuals) ===
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Install free realistic TTS (edge-tts)
        run: |
          python -m pip install --upgrade pip 2>/dev/null || true
          python -m pip install edge-tts 2>/dev/null || python3 -m pip install edge-tts 2>/dev/null || echo "edge-tts install skipped (not critical)"
          python -m pip install gtts 2>/dev/null || python3 -m pip install gtts 2>/dev/null || echo "gtts install skipped (not critical)"

      - name: Create required directories
        run: |
          mkdir -p base-videos music data logs generated_videos

      - name: Download base videos from URLs (if configured)
        env:
          BASE_VIDEO_URLS: ${{ secrets.BASE_VIDEO_URLS }}
        run: |
          if [ -z "$BASE_VIDEO_URLS" ]; then
            echo "No BASE_VIDEO_URLS configured, skipping."
            exit 0
          fi
          IFS=',' read -ra URLS <<< "$BASE_VIDEO_URLS"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            if [ -n "$url" ]; then
              echo "Downloading: $url"
              curl -L -o "base-videos/$(basename "$url")" "$url" || echo "Failed to download $url"
            fi
          done

      - name: Download music from URLs (if configured)
        env:
          MUSIC_URLS: ${{ secrets.MUSIC_URLS }}
        run: |
          if [ -z "$MUSIC_URLS" ]; then
            echo "No MUSIC_URLS configured, skipping."
            exit 0
          fi
          IFS=',' read -ra URLS <<< "$MUSIC_URLS"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            if [ -n "$url" ]; then
              echo "Downloading music: $url"
              curl -L -o "music/$(basename "$url")" "$url" || echo "Failed to download $url"
            fi
          done

      - name: Run auto upload script
        env:
          # === Core Settings ===
          COMMAND: ${{ github.event.inputs.command || 'RUN_AUTO' }}
          FORCE_UPLOAD: ${{ github.event.inputs.force_upload || 'false' }}
          
          # === FREE: Smart Schedule (analyzes your channel to find best upload time) ===
          SMART_SCHEDULE: 'true'
          SCHEDULE_TZ: '${{ vars.SCHEDULE_TZ || ''UTC'' }}'
          SCHEDULE_LEAD_MINUTES: '${{ vars.SCHEDULE_LEAD_MINUTES || ''15'' }}'
          SCHEDULE_WINDOW_MINUTES: '${{ vars.SCHEDULE_WINDOW_MINUTES || ''10'' }}'
          
          # === FREE: Viral Mode - Optimized for Shorts growth ===
          VIRAL_MODE: 'true'
          MIN_DURATION: '20'
          MAX_DURATION: '40'
          
          # === FREE: Script Settings ===
          PROMPT: '${{ vars.PROMPT || '''' }}'
          SCRIPT_LANGUAGE: '${{ vars.SCRIPT_LANGUAGE || ''English'' }}'
          
          # === FREE: Content Strategy (from channel analysis) ===
          TOPIC_LIST: '${{ vars.TOPIC_LIST || ''success,mindset,money,productivity,discipline,hustle,focus'' }}'
          TOPIC_BLOCKLIST: '${{ vars.TOPIC_BLOCKLIST || '''' }}'
          CHANNEL_CONTEXT: '${{ vars.CHANNEL_CONTEXT || ''motivational shorts'' }}'
          
          # === FREE: Trend Sources ===
          ENABLE_TRENDS: 'true'
          TRENDS_REGION: '${{ vars.TRENDS_REGION || ''US'' }}'
          TREND_MAX_TOPICS: '15'
          ENABLE_TREND_SHORTS: 'true'
          ENABLE_COMPETITOR_ANALYSIS: 'true'
          COMPETITOR_QUERY: '${{ vars.COMPETITOR_QUERY || ''motivation'' }}'
          
          # === FREE: Metadata Optimization ===
          AUTO_METADATA: 'true'
          TITLE_VARIANTS: '3'
          TITLE_POLISH: 'true'
          TITLE_PREFIXES: '${{ vars.TITLE_PREFIXES || ''Stop,Start,How to,Why,The Secret,One Rule'' }}'
          HOOK_VARIANTS: '5'
          APPEND_CTA: 'true'
          CTA_LIST: '${{ vars.CTA_LIST || ''Save this. Share it.,Follow for more daily motivation.,Subscribe for more success mindset tips.'' }}'
          
          # === FREE: Visual Settings ===
          SUBTITLE_MODE: 'word'
          SUBTITLE_HIGHLIGHT: 'true'
          KEYWORD_POPUPS: 'true'
          HOOK_BOOST: 'true'
          HOOK_UPPERCASE: 'true'
          TEXT_GLOW: 'true'
          COLOR_GRADE_PRESET: 'auto'
          EXTRA_EFFECTS: 'true'
          CAMERA_SHAKE: 'true'
          MOTION_BLUR: 'true'
          AUDIO_DUCKING: 'true'
          TRIM_SILENCE: 'true'
          
          # === FREE: Hashtags & Engagement ===
          HASHTAGS: '${{ vars.HASHTAGS || ''#shorts,#motivation,#success,#mindset,#viral,#fyp'' }}'
          POST_COMMENT: '${{ vars.POST_COMMENT || ''false'' }}'
          PINNED_COMMENT: '${{ vars.PINNED_COMMENT || '''' }}'
          
          # === OPTIONAL: Dropbox Backup (free tier: 2GB) ===
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_FOLDER_PATH: ${{ secrets.DROPBOX_FOLDER_PATH }}
          DROPBOX_USE_SYSTEM_FOLDERS: 'true'
          DROPBOX_UPLOAD_BACKUPS: '${{ vars.DROPBOX_UPLOAD_BACKUPS || ''false'' }}'
          DROPBOX_SAVE_GENERATED: '${{ vars.DROPBOX_SAVE_GENERATED || ''true'' }}'
          
          # === FREE: OpenRouter (free AI models as fallback) ===
          OPENAI_BASE_URL: 'https://openrouter.ai/api/v1'
          OPENAI_MODEL: '${{ vars.OPENAI_MODEL || ''meta-llama/llama-3.2-3b-instruct:free'' }}'
          OPENAI_MODEL_FALLBACK: 'meta-llama/llama-3.2-3b-instruct:free'
          OPENAI_MODEL_LIST: 'meta-llama/llama-3.2-3b-instruct:free,google/gemini-3.1-flash-lite-preview:free,stepfun/step-3.5-flash:free'
          
          # === FREE: Stock Media ===
          ENABLE_STOCK_VIDEO: 'true'
          ENABLE_IMAGE_MODE: 'true'
          MIX_USER_MEDIA: 'true'
          
          # === FREE: Backup ===
          FALLBACK_BASE_UPLOAD: 'true'
          FALLBACK_GENERATED_VIDEO: 'true'
          SAVE_GENERATED_VIDEOS: 'true'
          
          # === FREE: YouTube Privacy ===
          YOUTUBE_PRIVACY_STATUS: '${{ vars.YOUTUBE_PRIVACY_STATUS || ''public'' }}'

        run: node scripts/autoUpload.js

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload generated videos (optional artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: generated_videos/
          retention-days: 3
          if-no-files-found: ignore