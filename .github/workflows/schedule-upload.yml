name: Daily Shorts Factory - Auto Upload

on:
  schedule:
    - cron: '15 6,8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Force upload'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      command:
        description: 'Command'
        required: false
        default: 'UPLOAD_NOW'
        type: choice
        options:
          - 'UPLOAD_NOW'
          - 'GENERATE_BACKUP'
          - 'BACKUP_ONLY'
          - 'CHECK_LOGS'

env:
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (FFmpeg + eSpeak + Python)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg espeak-ng python3-pip 2>/dev/null || true
          pip3 install --quiet edge-tts gtts 2>/dev/null || true

      - name: Install Node dependencies
        run: npm install --omit=dev

      - name: Create directories
        run: mkdir -p base-videos music data logs generated_videos

      - name: Download base videos if URLs provided
        env:
          BASE_VIDEO_URLS: ${{ secrets.BASE_VIDEO_URLS }}
        run: |
          if [ -z "$BASE_VIDEO_URLS" ]; then echo "No base video URLs"; exit 0; fi
          IFS=',' read -ra URLS <<< "$BASE_VIDEO_URLS"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && curl -sL -o "base-videos/$(basename "$url")" "$url" || echo "Failed: $url"
          done

      - name: Run auto upload
        env:
          COMMAND: ${{ github.event.inputs.command || 'UPLOAD_NOW' }}
          FORCE_UPLOAD: ${{ github.event.inputs.force_upload || 'true' }}
          
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          
          VIRAL_MODE: 'true'
          MIN_DURATION: '20'
          MAX_DURATION: '40'
          ENABLE_TRENDS: 'true'
          AUTO_METADATA: 'true'
          TITLE_VARIANTS: '3'
          HOOK_VARIANTS: '5'
          APPEND_CTA: 'true'
          ENABLE_STOCK_VIDEO: 'true'
          ENABLE_IMAGE_MODE: 'true'
          FALLBACK_BASE_UPLOAD: 'true'
          FALLBACK_GENERATED_VIDEO: 'true'
          SAVE_GENERATED_VIDEOS: 'true'
          YOUTUBE_PRIVACY_STATUS: 'public'
          
          # === FIXED: Actually working free AI models ===
          OPENAI_BASE_URL: ''
          OPENAI_MODEL: 'gpt-4o-mini'
          TOPIC_LIST: 'success,mindset,money,productivity,discipline'
          
        run: node scripts/autoUpload.js

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload generated videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: generated_videos/
          retention-days: 3
          if-no-files-found: ignore